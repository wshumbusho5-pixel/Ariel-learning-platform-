[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Pure unit tests (no database)
    integration: Integration tests with mongomock
    api: API endpoint tests
    slow: Tests that take >1 second
    external: Tests requiring external services (skip in CI)
addopts =
    --verbose
    --strict-markers
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    -p no:warnings
